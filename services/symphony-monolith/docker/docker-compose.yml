services:
  db:
    image: postgres:16-alpine
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U app -d app" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: app
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    volumes:
      - postgres_data:/var/lib/postgresql/data

  user-service:
    build:
      context: ../../user-service
      dockerfile: Dockerfile
    environment:
      PORT: "8080"
      DATABASE_URL: "${DATABASE_URL:?Set DATABASE_URL (for local use this should point
        to DEV Cloud SQL)}"
    ports:
      - "8081:8080"

  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: dev
    healthcheck:
      test: [ "CMD-SHELL", "curl -fsS http://localhost:8080/health > /dev/null || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    ports:
      - "8080:8080"
    volumes:
      - ..:/app
      - vendor:/app/vendor
    environment:
      APP_ENV: dev
      DATABASE_URL: "${DATABASE_URL:?Set DATABASE_URL (for local use this should point
        to DEV Cloud SQL)}"
      USER_SERVICE_BASE_URL: "${USER_SERVICE_BASE_URL:-http://user-service:8080}"
    depends_on:
      - user-service
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  vendor:
  postgres_data:
