services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: dev
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health > /dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    ports:
      - "8080:8080"
    volumes:
      - ..:/app
      - vendor:/app/vendor
    environment:
      APP_ENV: dev
      DATABASE_URL: "${DATABASE_URL:?Set DATABASE_URL (for local use this should point to DEV Cloud SQL)}"

volumes:
  vendor:
