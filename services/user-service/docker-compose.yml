version: "3.8"

networks:
  app-network:
    driver: bridge

services:
  neo4j:
    image: neo4j:5.15
    container_name: user-service-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/testpassword
      NEO4J_PLUGINS: "[\"apoc\"]"
      NEO4J_dbms_memory_heap_max__size: 512M
    volumes:
      - neo4j_data:/var/lib/neo4j/data
    healthcheck:
      test: [ "CMD", "cypher-shell", "-u", "neo4j", "-p", "testpassword", "RETURN 1" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: user-service
    ports:
      - "8081:8080"
    environment:
      APP_ENV: dev
      NEO4J_URI: neo4j://neo4j:7687
      NEO4J_USERNAME: neo4j
      NEO4J_PASSWORD: testpassword
    depends_on:
      neo4j:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  neo4j_data:
