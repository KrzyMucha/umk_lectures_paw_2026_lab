name: Deploy audit-log-service DEV

on:
  push:
    branches:
      - develop
    paths:
      - "services/audit-log-service/**"
      - "infra/audit-log-service/**"
      - ".github/workflows/deploy-audit-log-service.yml"
  pull_request:
    branches:
      - develop
    paths:
      - "services/audit-log-service/**"
      - "infra/audit-log-service/**"
      - ".github/workflows/deploy-audit-log-service.yml"

env:
  PROJECT_ID: paw-2026-496213
  REGION: europe-central2
  REGISTRY: europe-central2-docker.pkg.dev
  REPOSITORY: mini-allegro
  IMAGE: audit-log-service
  SERVICE_DEV: audit-log-service

jobs:
  validate-secrets:
    name: Validate required secrets
    runs-on: ubuntu-latest

    steps:
      - name: Validate required secrets are set
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
          TF_STATE_BUCKET: ${{ secrets.TF_STATE_BUCKET }}
        run: |
          if [ -z "$GCP_SA_KEY" ]; then
            echo "Missing required secret: GCP_SA_KEY"
            exit 1
          fi
          if [ -z "$TF_STATE_BUCKET" ]; then
            echo "Missing required secret: TF_STATE_BUCKET"
            exit 1
          fi

  build:
    name: Build and push Docker image
    needs: validate-secrets
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Generate image tag
        id: meta
        run: |
          IMAGE_TAG="${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE }}:${{ github.sha }}-dev"
          echo "image_tag=${IMAGE_TAG}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: services/audit-log-service
          file: services/audit-log-service/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.image_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy infrastructure and service
    needs: build
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform init
        working-directory: infra/audit-log-service
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="prefix=audit-log-service"

      - name: Terraform apply
        working-directory: infra/audit-log-service
        run: |
          terraform apply -auto-approve \
            -var="image=${{ needs.build.outputs.image_tag }}"

      - name: Health check GET /health
        id: health
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE_DEV }} \
            --region=${{ env.REGION }} \
            --format='value(status.url)')
          echo "service_url=${URL}" >> $GITHUB_OUTPUT
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL/health")
          if [ "$STATUS" != "200" ]; then
            echo "Health check failed! Got HTTP $STATUS"
            exit 1
          fi
          echo "audit-log-service is healthy"

  integ-tests:
    name: Integration tests
    needs: deploy
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Get service URL
        id: url
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE_DEV }} \
            --region=${{ env.REGION }} \
            --format='value(status.url)')
          echo "service_url=${URL}" >> $GITHUB_OUTPUT

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pytest
        run: pip install pytest --quiet

      - name: Run integration tests
        working-directory: integ-tests
        env:
          AUDIT_LOG_SERVICE_URL: ${{ steps.url.outputs.service_url }}
        run: pytest test_audit_logs.py -v
