name: Build & Deploy mini-allegro

on:
  push:
    branches:
      - develop
      - main
    paths:
      - "services/symphony-monolith/**"
      - "integ-tests/**"
      - ".github/workflows/deploy.yml"

env:
  PROJECT_ID: project-f5f4f6f0-acae-485b-a16
  REGION: europe-central2
  REGISTRY: europe-central2-docker.pkg.dev
  REPOSITORY: mini-allegro
  IMAGE: mini-allegro
  SERVICE_DEV: mini-allegro-dev
  SERVICE_PROD: mini-allegro-prod

jobs:
  build:
    name: Build & Push Docker image
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Generate image tag
        id: meta
        run: |
          IMAGE_TAG="${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE }}:${{ github.sha }}"
          echo "image_tag=${IMAGE_TAG}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image (with cache)
        uses: docker/build-push-action@v6
        with:
          context: services/symphony-monolith
          file: services/symphony-monolith/docker/Dockerfile
          target: prod
          push: true
          tags: ${{ steps.meta.outputs.image_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-dev:
    name: Deploy to DEV
    needs: build
    runs-on: ubuntu-latest
    environment: dev
    if: github.ref == 'refs/heads/develop'

    steps:
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Deploy to Cloud Run DEV
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_DEV }}
          region: ${{ env.REGION }}
          image: ${{ needs.build.outputs.image_tag }}
          env_vars: |
            APP_ENV=dev
            DATABASE_URL=${{ secrets.DEV_DATABASE_URL }}

  integration-tests-dev:
    name: Integration tests (DEV)
    needs: deploy-dev
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        working-directory: services/symphony-monolith
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Resolve DEV URL
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE_DEV }} \
            --region=${{ env.REGION }} \
            --format='value(status.url)')
          echo "APP_BASE_URL=$URL" >> $GITHUB_ENV
          echo "Using DEV URL: $URL"

      - name: Wait for DEV health endpoint
        run: |
          HEALTH_URL="${APP_BASE_URL%/}/health"
          for i in {1..30}; do
            if curl -fsS "$HEALTH_URL" > /dev/null; then
              echo "Application is healthy: $HEALTH_URL"
              exit 0
            fi
            echo "Waiting for deployed app... ($i/30)"
            sleep 10
          done
          echo "Application did not become healthy in time: $HEALTH_URL"
          exit 1

      - name: Run integration tests against DEV
        working-directory: services/symphony-monolith
        run: pytest ../../integ-tests

  deploy-prod:
    name: Deploy to PROD
    needs: build
    runs-on: ubuntu-latest
    environment: prod
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Deploy to Cloud Run PROD
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_PROD }}
          region: ${{ env.REGION }}
          image: ${{ needs.build.outputs.image_tag }}
          env_vars: |
            APP_ENV=prod
            DATABASE_URL=${{ secrets.PROD_DATABASE_URL }}

  integration-tests-prod:
    name: Integration tests (PROD)
    needs: deploy-prod
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        working-directory: services/symphony-monolith
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Resolve PROD URL
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE_PROD }} \
            --region=${{ env.REGION }} \
            --format='value(status.url)')
          echo "APP_BASE_URL=$URL" >> $GITHUB_ENV
          echo "Using PROD URL: $URL"

      - name: Wait for PROD health endpoint
        run: |
          HEALTH_URL="${APP_BASE_URL%/}/health"
          for i in {1..30}; do
            if curl -fsS "$HEALTH_URL" > /dev/null; then
              echo "Application is healthy: $HEALTH_URL"
              exit 0
            fi
            echo "Waiting for deployed app... ($i/30)"
            sleep 10
          done
          echo "Application did not become healthy in time: $HEALTH_URL"
          exit 1

      - name: Run integration tests against PROD
        working-directory: services/symphony-monolith
        run: pytest ../../integ-tests
