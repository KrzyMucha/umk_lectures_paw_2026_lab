name: Build & Deploy mini-allegro

on:
  push:
    branches:
      - develop
      - main
    paths:
      - "services/mini-allegro/**"
      - ".github/workflows/deploy.yml"

env:
  PROJECT_ID: project-f5f4f6f0-acae-485b-a16
  REGION: europe-central2
  REGISTRY: europe-central2-docker.pkg.dev
  REPOSITORY: mini-allegro
  IMAGE: mini-allegro
  SERVICE_DEV: mini-allegro-dev
  SERVICE_PROD: mini-allegro-prod

jobs:
  python-api-tests:
    name: Python API tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        working-directory: services/mini-allegro
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Start application stack
        working-directory: services/mini-allegro
        run: docker compose up -d --build

      - name: Wait for health endpoint
        working-directory: services/mini-allegro
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:8080/health > /dev/null; then
              echo "Application is healthy"
              exit 0
            fi
            echo "Waiting for app... ($i/30)"
            sleep 5
          done
          echo "Application did not become healthy in time"
          docker compose logs
          exit 1

      - name: Run Python API tests
        working-directory: services/mini-allegro
        env:
          APP_BASE_URL: http://localhost:8080
        run: pytest

      - name: Show container logs on failure
        if: failure()
        working-directory: services/mini-allegro
        run: docker compose logs

      - name: Stop application stack
        if: always()
        working-directory: services/mini-allegro
        run: docker compose down -v

  build:
    name: Build & Push Docker image
    needs: python-api-tests
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Generate image tag
        id: meta
        run: |
          IMAGE_TAG="${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE }}:${{ github.sha }}"
          echo "image_tag=${IMAGE_TAG}" >> $GITHUB_OUTPUT

      - name: Build Docker image
        working-directory: services/mini-allegro
        run: |
          docker build \
            --target prod \
            --tag ${{ steps.meta.outputs.image_tag }} \
            .

      - name: Push Docker image to Artifact Registry
        run: docker push ${{ steps.meta.outputs.image_tag }}

  deploy-dev:
    name: Deploy to DEV
    needs: build
    runs-on: ubuntu-latest
    environment: dev
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Deploy to Cloud Run DEV
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_DEV }}
          region: ${{ env.REGION }}
          image: ${{ needs.build.outputs.image_tag }}
          env_vars: |
            APP_ENV=dev
            DATABASE_URL=${{ secrets.DEV_DATABASE_URL }}

      # - name: Allow public access to Cloud Run DEV
      #   run: |
      #     gcloud run services add-iam-policy-binding ${{ env.SERVICE_DEV }} \
      #       --region=${{ env.REGION }} \
      #       --member="allUsers" \
      #       --role="roles/run.invoker"

      - name: Check DEV health (HTTP 200)
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE_DEV }} \
            --region=${{ env.REGION }} \
            --format='value(status.url)')
          echo "DEV URL: $URL"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL/health")
          echo "HTTP Status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Health check failed! Got HTTP $STATUS"
            exit 1
          fi
          echo "Health check passed!"

      - name: Checkout code for PR
        if: github.ref == 'refs/heads/develop'
        uses: actions/checkout@v4

      - name: Create PR to main
        if: github.ref == 'refs/heads/develop'
        run: |
          EXISTING=$(gh pr list --base main --head develop --state open --json number --jq length)
          if [ "$EXISTING" = "0" ]; then
            gh pr create \
              --base main \
              --head develop \
              --title "Deploy to PROD [$(date +'%Y-%m-%d %H:%M')] - ${{ github.sha }}" \
              --body "Health check na DEV przeszedł ✅. Zatwierdź PR aby deployować na PROD."
            echo "PR created."
          else
            echo "PR already exists, skipping."
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy-prod:
    name: Deploy to PROD
    needs: [build, deploy-dev]
    runs-on: ubuntu-latest
    environment: prod
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Deploy to Cloud Run PROD
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_PROD }}
          region: ${{ env.REGION }}
          image: ${{ needs.build.outputs.image_tag }}
          env_vars: |
            APP_ENV=prod
            DATABASE_URL=${{ secrets.PROD_DATABASE_URL }}

      # - name: Allow public access to Cloud Run PROD
      #   run: |
      #     gcloud run services add-iam-policy-binding ${{ env.SERVICE_PROD }} \
      #       --region=${{ env.REGION }} \
      #       --member="allUsers" \
      #       --role="roles/run.invoker"

      - name: Check PROD health (HTTP 200)
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE_PROD }} \
            --region=${{ env.REGION }} \
            --format='value(status.url)')
          echo "PROD URL: $URL"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL/health")
          echo "HTTP Status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Health check failed! Got HTTP $STATUS"
            exit 1
          fi
          echo "Health check passed!"
