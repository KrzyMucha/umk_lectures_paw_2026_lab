name: CI

on:
  pull_request:
    branches:
      - develop
      - main
    paths:
      - "services/symphony-monolith/**"
      - ".github/workflows/build.yml"
  workflow_dispatch:

jobs:
  build-image-check:
    name: Build Docker image (CI)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build production image
        working-directory: services/symphony-monolith
        run: |
          docker build \
            --file docker/Dockerfile \
            --target prod \
            --tag mini-allegro:ci \
            .
