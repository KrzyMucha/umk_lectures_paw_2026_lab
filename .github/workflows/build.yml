name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  python-api-tests-local:
    name: Python API tests (local docker)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        working-directory: services/symphony-monolith
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Build and start application stack
        working-directory: services/symphony-monolith
        run: docker compose -f docker/docker-compose.yml -f docker/compose.override.yaml up -d --build

      - name: Install PHP dependencies inside app container
        working-directory: services/symphony-monolith
        run: docker compose -f docker/docker-compose.yml -f docker/compose.override.yaml exec -T app composer install --no-interaction --prefer-dist

      - name: Verify Symfony runtime autoloader
        working-directory: services/symphony-monolith
        run: docker compose -f docker/docker-compose.yml -f docker/compose.override.yaml exec -T app test -f vendor/autoload_runtime.php

      - name: Wait for health endpoint
        working-directory: services/symphony-monolith
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:8080/health > /dev/null; then
              echo "Application is healthy"
              exit 0
            fi
            echo "Waiting for app... ($i/30)"
            sleep 5
          done
          echo "Application did not become healthy in time"
          docker compose -f docker/docker-compose.yml -f docker/compose.override.yaml logs
          exit 1

      - name: Run Python API tests
        working-directory: services/symphony-monolith
        env:
          APP_BASE_URL: http://localhost:8080
        run: pytest ../../integ-tests

      - name: Show container logs on failure
        if: failure()
        working-directory: services/symphony-monolith
        run: docker compose -f docker/docker-compose.yml -f docker/compose.override.yaml logs

      - name: Stop application stack
        if: always()
        working-directory: services/symphony-monolith
        run: docker compose -f docker/docker-compose.yml -f docker/compose.override.yaml down -v

  python-api-tests-gcp:
    name: Python API tests (GCP URL)
    runs-on: ubuntu-latest
    if: vars.GCP_APP_BASE_URL != ''
    timeout-minutes: 10

    env:
      APP_BASE_URL: ${{ vars.GCP_APP_BASE_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        working-directory: services/symphony-monolith
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Wait for deployed service health
        run: |
          HEALTH_URL="${APP_BASE_URL%/}/health"
          for i in {1..30}; do
            if curl -fsS "$HEALTH_URL" > /dev/null; then
              echo "Application is healthy: $HEALTH_URL"
              exit 0
            fi
            echo "Waiting for deployed app... ($i/30)"
            sleep 10
          done
          echo "Application did not become healthy in time: $HEALTH_URL"
          exit 1

      - name: Run Python API tests against deployed URL
        working-directory: services/symphony-monolith
        run: pytest ../../integ-tests
