name: CI

on:
  pull_request:
    branches:
      - develop
      - main
    paths:
      - "services/symphony-monolith/**"
      - ".github/workflows/build.yml"
  workflow_dispatch:

jobs:
  build-image-check:
    name: Build Docker image (CI)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build production image (with cache)
        uses: docker/build-push-action@v6
        with:
          context: services/symphony-monolith
          file: services/symphony-monolith/docker/Dockerfile
          target: prod
          push: false
          tags: mini-allegro:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
