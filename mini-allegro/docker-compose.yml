services:
  app:
    build:
      context: .
      target: dev
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health > /dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    ports:
      - "8080:8080"
    volumes:
      - .:/app
      - vendor:/app/vendor
    environment:
      APP_ENV: dev
      DATABASE_URL: "postgresql://app:secret@database:5432/mini_allegro?serverVersion=15&charset=utf8"
    depends_on:
      database:
        condition: service_healthy

  database:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: mini_allegro
      POSTGRES_USER: app
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d mini_allegro"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  vendor:
