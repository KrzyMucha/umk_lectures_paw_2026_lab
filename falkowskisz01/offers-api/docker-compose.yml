services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: offers_api_app
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    ports:
      - "8000:8000"
    environment:
      APP_ENV: dev
      APP_DEBUG: 1
      DATABASE_URL: postgresql://app:app@database:5432/offers_db?serverVersion=15&charset=utf8
    depends_on:
      - database

  database:
    image: postgres:15
    container_name: offers_api_db
    environment:
      POSTGRES_DB: offers_db
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
